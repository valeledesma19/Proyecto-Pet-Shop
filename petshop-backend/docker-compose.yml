version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: petshop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-petshop_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - petshop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-petshop_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - petshop-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petshop-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-petshop_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      JWT_SECRET: ${JWT_SECRET:-cambiaEstaClaveSecretaPorUnaMuyLargaYSeguraEnProduccion123456789}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      UPLOADS_DIR: /app/uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - petshop_uploads:/app/uploads
    networks:
      - petshop-network

volumes:
  petshop_pgdata:
    name: petshop_pgdata
  petshop_uploads:
    name: petshop_uploads

networks:
  petshop-network:
    name: petshop-network
    driver: bridge
